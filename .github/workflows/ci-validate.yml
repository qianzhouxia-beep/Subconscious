name: CI — Validate & Link Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate requirements.txt
        run: |
          echo "=== Checking dependency validity ==="
          pip install --dry-run -r requirements.txt 2>&1 | tail -5
          echo "=== Dependency check passed ==="

      - name: Python syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile backend/email_templates.py
          echo "=== Python syntax OK ==="

      - name: Dead link scanner
        run: |
          python scripts/deadlink.py

      - name: HTML anchor validator
        run: |
          python scripts/validate-anchors.py
